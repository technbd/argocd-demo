apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-app
  namespace: argocd
  
spec:
  project: default

  source:
    repoURL: https://github.com/technbd/argocd-demo.git
    targetRevision: HEAD
    path: kustomize-yamls

  destination:
    server: https://kubernetes.default.svc
    namespace: demo        # where is deployed 
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true


